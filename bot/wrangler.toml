[vars]
# Non-secret config — safe to commit
FIREBASE_PROJECT_ID = "learnpc-4fd7b"
ADMIN_TELEGRAM_IDS = "1719425054"
PASS_THRESHOLD = "67"
MIMO_BASE_URL = "https://opencode.ai/zen/v1"
